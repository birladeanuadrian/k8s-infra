apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium-mount-fix
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: cilium-mount-fix
  template:
    metadata:
      labels:
        app: cilium-mount-fix
    spec:
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: mount-fix
          image: alpine:latest
          securityContext:
            privileged: true
          command:
            - nsenter
            - -t
            - "1"
            - -m
            - -u
            - -n
            - -i
            - sh
            - -c
            - |
              mount bpffs /sys/fs/bpf -t bpf || true
              mount --make-shared /sys/fs/bpf || true
              mkdir -p /run/cilium/cgroupv2 || true
              mount -t cgroup2 none /run/cilium/cgroupv2 || true
              mount --make-shared /run/cilium/cgroupv2 || true
              echo "Mounts fixed"
      containers:
        - name: sleep
          image: alpine:latest
          command: ["sleep", "infinity"]
