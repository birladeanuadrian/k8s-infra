apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-data-plane-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - envoy-gateway-system
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy
      app.kubernetes.io/component: proxy
  podMetricsEndpoints:
    - port: http-metrics
      path: /stats/prometheus
      interval: 15s

