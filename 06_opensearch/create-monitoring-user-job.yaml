apiVersion: batch/v1
kind: Job
metadata:
  name: create-monitoring-user
  namespace: opensearch
spec:
  template:
    spec:
      containers:
      - name: create-user
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Encoding credentials..."
            AUTH_CRED=$(printf "admin:$ADMIN_PASSWORD" | base64)

            echo "Waiting for OpenSearch to be ready..."
            until curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Basic $AUTH_CRED" http://opensearch-cluster-master:9200; do
              sleep 5
            done
            
            echo "Checking if user already exists..."
            user_check=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Basic $AUTH_CRED" "http://opensearch-cluster-master:9200/_plugins/_security/api/internalusers/prom_exporter")
            
            if [ "$user_check" -eq 200 ]; then
                echo "User 'prom_exporter' already exists. Updating password/properties..."
            elif [ "$user_check" -eq 404 ]; then
                echo "User 'prom_exporter' does not exist. Creating..."
            else
                echo "Warning: Error checking user existence (HTTP $user_check). Proceeding with create/update attempt..."
            fi

            echo "Creating/Updating exporter user..."
            response=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "http://opensearch-cluster-master:9200/_plugins/_security/api/internalusers/prom_exporter" \
              -H "Authorization: Basic $AUTH_CRED" \
              -H "Content-Type: application/json" \
              -d "{
                \"password\": \"$EXPORTER_PASSWORD\",
                \"backend_roles\": [\"readall\", \"cluster_monitor\"]
              }")
            
            if [ "$response" -eq 200 ] || [ "$response" -eq 201 ]; then
              echo "User 'prom_exporter' created/updated successfully."
            else
              echo "Failed to create user. HTTP Status: $response"
              exit 1
            fi

            echo "Creating 'prometheus_exporter_role'..."
            role_response=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "http://opensearch-cluster-master:9200/_plugins/_security/api/roles/prometheus_exporter_role" \
              -H "Authorization: Basic $AUTH_CRED" \
              -H "Content-Type: application/json" \
              -d '{
                "cluster_permissions": [
                    "cluster:monitor/prometheus/metrics",
                    "cluster:monitor/health",
                    "cluster:monitor/nodes/stats",
                    "cluster:monitor/state",
                    "cluster:monitor/stats",
                    "cluster:monitor/nodes/info",
                    "cluster:monitor/task"
                ],
                "index_permissions": [{
                    "index_patterns": ["*"],
                    "allowed_actions": [
                        "indices:monitor/stats",
                        "indices:monitor/settings/get",
                        "indices:monitor/recovery"
                    ]
                }]
              }')

            if [ "$role_response" -eq 200 ] || [ "$role_response" -eq 201 ]; then
               echo "Role created/updated."
            else
               echo "Failed to create role. HTTP Status: $role_response"
               exit 1
            fi

            echo "Mapping 'prometheus_exporter_role' to 'prom_exporter'..."
            mapping_response=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "http://opensearch-cluster-master:9200/_plugins/_security/api/rolesmapping/prometheus_exporter_role" \
              -H "Authorization: Basic $AUTH_CRED" \
              -H "Content-Type: application/json" \
              -d '{
                "users": ["prom_exporter"]
              }')

            if [ "$mapping_response" -eq 200 ] || [ "$mapping_response" -eq 201 ]; then
               echo "Role mapping created/updated."
            else
               echo "Failed to create role mapping. HTTP Status: $mapping_response"
               exit 1
            fi
        env:
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: opensearch-admin-password
                key: password
          - name: EXPORTER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: opensearch-exporter-creds
                key: password
      restartPolicy: OnFailure
