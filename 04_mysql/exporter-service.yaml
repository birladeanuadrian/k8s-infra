apiVersion: v1
kind: Service
metadata:
  name: mysql-exporter-service
  namespace: mysql
  labels:
    app.kubernetes.io/instance: mysql-cluster
    app.kubernetes.io/component: mysql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http-metrics
    port: 9104
    targetPort: 9104
    protocol: TCP
  selector:
    app.kubernetes.io/instance: mysql-cluster
    app.kubernetes.io/component: database
    app.kubernetes.io/name: mysql

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-router-exporter-service
  namespace: mysql
  labels:
    app.kubernetes.io/instance: mysql-cluster
    app.kubernetes.io/component: router
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http-router-metrics
    port: 8443
    targetPort: 8443
    protocol: TCP
  selector:
    app.kubernetes.io/instance: mysql-cluster
    app.kubernetes.io/component: router
    app.kubernetes.io/name: mysql-router
