apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mysql-cluster-monitor
  namespace: monitoring
  labels:
    app: mysql-cluster
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - mysql
  selector:
    matchLabels:
      app.kubernetes.io/instance: mysql-cluster
      app.kubernetes.io/component: mysql
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mysql-router-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - mysql
  selector:
    matchLabels:
      app.kubernetes.io/instance: mysql-cluster
      app.kubernetes.io/component: router
  endpoints:
    - port: http-router-metrics
      path: /metrics
      interval: 15s
