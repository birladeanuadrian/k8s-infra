apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: mysql-cluster
  namespace: mysql
spec:
  crVersion: 1.0.0

  secretsName: mysql-cluster-secrets

  mysql:
    clusterType: group-replication
    autoRecovery: true
    size: 3
    image: percona/percona-server:8.0.45
    env:
      - name: MYSQL_ROOT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-cluster-secrets
            key: ROOT_PASSWORD
      - name: MYSQL_DATABASE
        valueFrom:
          secretKeyRef:
            name: mysql-cluster-secrets
            key: DATABASE
      - name: MYSQL_USER
        valueFrom:
          secretKeyRef:
            name: mysql-cluster-secrets
            key: USER
      - name: MYSQL_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-cluster-secrets
            key: PASSWORD
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    volumeSpec:
      persistentVolumeClaim:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    sidecars:
      - name: mysqld-exporter
        image: prom/mysqld-exporter:v0.18.0
        ports:
          - name: metrics
            containerPort: 9104
        env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-cluster-secrets
                key: ROOT_PASSWORD
        args:
          - "--config.my-cnf=/etc/mysqld_exporter/.my.cnf"
          - "--collect.info_schema.innodb_metrics"
          - "--collect.info_schema.innodb_tablespaces"
          - "--collect.info_schema.processlist"
          - "--collect.engine_innodb_status"
        volumeMounts:
          - name: exporter-config
            mountPath: /etc/mysqld_exporter/.my.cnf
            subPath: .my.cnf
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
    sidecarVolumes:
      - name: exporter-config
        secret:
          secretName: mysqld-exporter-config

  proxy:
    router:
      enabled: true
      size: 2
      image: percona/percona-mysql-router:8.0.45
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    haproxy:
      enabled: false
      image: perconalab/haproxy:main
      size: 0

  backup:
    enabled: true
    image: percona/percona-xtrabackup:8.0.35-34
    storages:
      s3-backup:
        type: s3
        s3:
          bucket: mysql-backups
          region: eu-central-1
          credentialsSecret: mysql-s3-backup-credentials
          endpointUrl: https://s3-vaina.nmbapp.net
    schedule:
      - name: daily-backup
        schedule: "0 3 * * *"
        keep: 7
        storageName: s3-backup
